<!doctype html>
<html lang="en" class="wa-dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>minilogue xd viewer</title>

    <!-- Critical: paint the dark chassis background before CSS/JS load so navigating between
         pages doesn't flash white (the panel itself is injected by JS). -->
    <style>
      html {
        background: #0d0d10;
        color-scheme: dark;
      }
    </style>

    <!-- Vercel Web Analytics (script served by Vercel at runtime once enabled). -->
    <script>
      window.va =
        window.va ||
        ((...args) => {
          window.vai = window.vai || []
          window.vai.push(args)
        })
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <div id="app">
      <h1 class="visually-hidden">minilogue xd patch viewer</h1>
      <header class="midi-bar">
        <a class="resynth-link" href="/resynth.html">Resynthesis →</a>
        <span id="midi-status" class="midi-status" role="status" data-state="requesting">
          <span class="midi-dot"></span>
          <span class="midi-text">Connecting to MIDI…</span>
        </span>
        <button id="midi-refresh" class="midi-refresh" type="button" hidden>Refresh</button>
      </header>

      <main id="main">
        <div id="panel-root"></div>

        <!-- Program library drawer (.mnlgxdlib) -->
        <wa-details id="library-panel" summary="Program library" hidden>
          <div id="program-list" role="listbox" aria-label="Program library"></div>
        </wa-details>

        <!-- Transient status (errors) -->
        <div id="status-bar" aria-live="polite"></div>
      </main>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
